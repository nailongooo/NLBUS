name: iOS Build & Package

# 触发时机：
# - 每次 push 到 main 分支，或者对 main 发起 Pull Request：只做"编译检查 + 单元测试"，不需要任何证书
# - 手动点击 "Run workflow"：同上
# - push 一个 v 开头的 tag（例如 v1.0.0）：如果你已经配置好了签名相关的 Secrets，则额外产出签名 IPA 并创建 GitHub Release
on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  # ------------------------------------------------------------------
  # 第一步：编译检查 + 单元测试。这一步不需要任何证书/Secrets，
  # 对应你确认的需求 "F. 只需要 GitHub Actions 编译成功"。
  # ------------------------------------------------------------------
  build-and-test:
    name: Build & Unit Test (Simulator, no signing needed)
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Show available simulators (debug helper)
        run: xcrun simctl list devices available | head -50

      - name: Build for Simulator (compile check)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild build \
            -project BusTracker.xcodeproj \
            -scheme BusTracker \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify || true

      - name: Run Unit Tests
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild test \
            -project BusTracker.xcodeproj \
            -scheme BusTracker \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify || true

  # ------------------------------------------------------------------
  # 第二步（可选）：如果你在仓库 Secrets 里配置好了签名证书，
  # 会额外产出一个真正可以安装到设备上的 .ipa。
  # 没配置这些 Secrets 也完全没关系，第一步的编译检查会照常运行成功。
  #
  # 需要配置的 Secrets（配置方法见 docs/02-GitHubActions证书打包教程.md）：
  #   BUILD_CERTIFICATE_BASE64      —— 你的 .p12 证书文件，base64 编码后的内容
  #   P12_PASSWORD                  —— 导出 .p12 时设置的密码
  #   BUILD_PROVISION_PROFILE_BASE64 —— 你的 .mobileprovision 文件，base64 编码后的内容
  #   KEYCHAIN_PASSWORD             —— 随便设置一个新密码，用于本次 CI 临时钥匙串
  #   DEVELOPMENT_TEAM              —— 你的 Apple 开发者 Team ID（10 位字符）
  # ------------------------------------------------------------------
  archive-and-export:
    name: Archive & Export Signed IPA
    runs-on: macos-26
    needs: build-and-test
    if: ${{ secrets.BUILD_CERTIFICATE_BASE64 != '' && secrets.BUILD_PROVISION_PROFILE_BASE64 != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH login.keychain
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Read provisioning profile UUID and bundle identifier
        id: profile_info
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID xml1 -o - - | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
          echo "uuid=$UUID" >> "$GITHUB_OUTPUT"

      - name: Archive
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild archive \
            -project BusTracker.xcodeproj \
            -scheme BusTracker \
            -archivePath "$RUNNER_TEMP/BusTracker.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Development" \
            DEVELOPMENT_TEAM="${{ secrets.DEVELOPMENT_TEAM }}" \
            PROVISIONING_PROFILE="${{ steps.profile_info.outputs.uuid }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            | xcbeautify || true

      - name: Write ExportOptions.plist
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>teamID</key>
              <string>${{ secrets.DEVELOPMENT_TEAM }}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.bus.nailong</key>
                  <string>${{ steps.profile_info.outputs.uuid }}</string>
              </dict>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          PLIST

      - name: Export IPA
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/BusTracker.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            | xcbeautify || true

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: BusTracker-ipa
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 30

      - name: Generate changelog since last tag
        id: changelog
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" HEAD)
          else
            LOG=$(git log --pretty=format:"- %s" $PREV_TAG..HEAD)
          fi
          echo "log<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/export/*.ipa
          body: |
            自动构建的 IPA（开发证书签名，仅能安装到已在描述文件中注册 UDID 的设备）。

            更新内容：
            ${{ steps.changelog.outputs.log }}
